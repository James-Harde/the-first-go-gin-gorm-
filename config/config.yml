# 配置文件主要是用来放置一些全局的配置参数，比如数据库连接信息、日志配置、缓存配置等。 通过配置文件，可以方便地管理和修改应用程序的设置，而不需要直接修改代码。
# config.yml：存配置内容（明文参数：端口、数据库账号密码）
    # JSON
    #   前后端接口传数据专用（网页、程序之间交换信息）
    #   机器读起来最快，写起来有一堆大括号引号，人看着繁琐
    # YML(YAML)
    #   程序配置文件专用（数据库地址、服务端口、开关参数）
    #   靠缩进分层，无多余符号，人写、人改最舒服
# Viper：工具库，负责把 yml 文件里的文本读进程序内存
# config.go：自己写的封装代码，把 Viper 读出来的数据规整成结构体，给项目其他地方直接调用
#依赖就是只服务于你这个项目代码的包而环境包括依赖，基础环境（比如go语言本身，操作系统什么的），配套的mysql,redis，配置文件，端口等这些
app:
  name: CurrencyExchangeApp
  port: 3000
database:
  host: localhost
  port: 3306
  user: your_username
  password: your_password
  name: currency_exchange_db